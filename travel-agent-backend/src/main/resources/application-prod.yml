spring:
  profiles:
    active: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      password: ${REDIS_PASSWORD}
      port: ${REDIS_PORT}

pinecone:
  api:
    key: ${PINECONE_API_KEY}
  environment: ${PINECONE_ENVIRONMENT}
  index:
    preferences: travel-preferences-prod
    history: travel-history-prod
    knowledge: knowledge-base-prod

openai:
  api:
    key: ${OPENAI_API_KEY}
  model: gpt-4
  embedding:
    model: text-embedding-ada-002

logging:
  level:
    com.travel.agent: INFO
    dev.langchain4j: INFO
