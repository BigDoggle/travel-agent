server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: travel-agent-backend

  datasource:
    url: jdbc:postgresql://db.oxxzzzzynkirfmpcobhh.supabase.co:5432/postgres?sslmode=require&connectTimeout=60
    username: postgres
    password: 6w8qAbxM9fb8pE3j
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 10
      connection-test-query: "SELECT 1"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        connection:
          provider_disables_autocommit: true

  redis:
    host: redis-16751.c57.us-east-1-4.ec2.cloud.redislabs.com
    port: 16751
    password: Kpk5v6cIrG1KjGDOWWew7a30JbT781QP
    database: 0
    timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000

pinecone:
  api:
    key: ${PINECONE_API_KEY:your-pinecone-api-key}
  environment: ${PINECONE_ENVIRONMENT:us-west1-gcp}
  index:
    preferences: ${PINECONE_INDEX_PREFERENCES:travel-preferences}
    history: ${PINECONE_INDEX_HISTORY:travel-history}
    knowledge: ${PINECONE_INDEX_KNOWLEDGE:knowledge-base}

openai:
  base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  api:
    key: ${OPENAI_API_KEY:sk-ef935c1876da486dbcfd6241bf95f2c1}
  model: ${OPENAI_MODEL:qwen-plus}
  embedding:
    model: ${OPENAI_EMBEDDING_MODEL:text-embedding-ada-002}

logging:
  level:
    root: INFO
    com.travel.agent: DEBUG
    dev.langchain4j: DEBUG
    com.zaxxer.hikari: DEBUG
    org.postgresql: DEBUG
    org.springframework.data.redis: DEBUG
    io.lettuce: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/travel-agent.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
