# Development Profile
spring.profiles.active=dev

# Database (Dev)
spring.datasource.url=jdbc:mysql://localhost:3306/travel_agent_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Redis (Dev)
spring.redis.host=localhost
spring.redis.port=6379

# Pinecone (Dev)
pinecone.api.key=${PINECONE_API_KEY:your-dev-api-key}
pinecone.environment=us-west1-gcp
pinecone.index.preferences=travel-preferences-dev
pinecone.index.history=travel-history-dev
pinecone.index.knowledge=knowledge-base-dev

# OpenAI (Dev)
openai.api.key=${OPENAI_API_KEY:your-dev-api-key}
openai.model=gpt-4
openai.embedding.model=text-embedding-ada-002

# Logging (Dev)
logging.level.com.travel.agent=DEBUG
logging.level.dev.langchain4j=DEBUG
